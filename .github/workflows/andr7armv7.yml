name: Build Android 7 ARMv7 Binary

on:
  workflow_dispatch:

jobs:
  build-android-armv7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi

      - name: Build Binary
        run: |
          NDK_PATH="${ANDROID_NDK_LATEST_HOME:-$ANDROID_HOME/ndk-bundle}"
          export CC="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang"
          export AR="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang"
          
          cargo build --release --target armv7-linux-androideabi
          
          # Пошук бінарника, щоб точно знати, як він називається
          echo "=== Знайдені скомпільовані файли ==="
          ls -la target/armv7-linux-androideabi/release/

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: trippy-android7-armv7
          # Використовуємо маску *, щоб забрати файл незалежно від його точного імені
          path: target/armv7-linux-androideabi/release/*
